name: Deploy to Contabo

# Fire on every CI workflow completing (all 5 + any new ones added)
on:
  workflow_run:
    workflows: ["*"]
    types: [completed]

concurrency:
  group: deploy-contabo
  cancel-in-progress: true

permissions:
  contents: read
  actions: read
  statuses: read

env:
  WORKFLOW_NAME: ${{ github.event.workflow_run.name }}
  COMMIT_SHA: ${{ github.event.workflow_run.head_sha }}
  DEPLOY_HOST: ${{ vars.DEPLOY_HOST }}
  DEPLOY_USER: ${{ vars.DEPLOY_USER }}
  DEPLOY_PATH: ${{ vars.DEPLOY_PATH }}
  DEPLOY_HEALTHCHECK_URL: ${{ vars.DEPLOY_HEALTHCHECK_URL }}
  CONTABO_SERVICES: "hmm-inference-api hmm-scheduler"

jobs:
  # ── Gate: only proceed if ALL CI workflows passed ──────────────────────
  gate:
    name: Gate — ${{ github.event.workflow_run.name }}
    runs-on: ubuntu-latest
    # Only run for our known CI workflows (exclude self to prevent self-trigger loop)
    if: >
      github.event.workflow_run.name != 'Deploy to Contabo' &&
      (
        github.event.workflow_run.name == 'SonarCloud SAST' ||
        github.event.workflow_run.name == 'CodeQL Advanced' ||
        github.event.workflow_run.name == 'Multi-Platform Build' ||
        github.event.workflow_run.name == 'OWASP ZAP DAST' ||
        github.event.workflow_run.name == 'Dependency Audit'
      )
    outputs:
      all_passed: ${{ steps.check-ci.outputs.all_passed }}
      deploy_sha: ${{ steps.check-ci.outputs.deploy_sha }}
      trigger_workflow: ${{ github.event.workflow_run.name }}
    steps:
      - name: Check all CI statuses
        id: check-ci
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Checking CI for commit: $COMMIT_SHA"
          echo "Triggered by: $WORKFLOW_NAME"

          # Check all 5 CI workflows for this commit
          WORKFLOWS=("SonarCloud SAST" "CodeQL Advanced" "Multi-Platform Build" "OWASP ZAP DAST" "Dependency Audit")
          ALL_PASSED=true
          DEPLOY_SHA=""

          for WF in "${WORKFLOWS[@]}"; do
            # Use gh api to get the latest run for this workflow + commit
            STATUS=$(gh api \
              "repos/${{ github.repository }}/actions/runs" \
              --jq ".workflow_runs[] | select(.name == \"$WF\" and .head_sha == \"$COMMIT_SHA\") | .conclusion" \
              --paginate 2>/dev/null | head -1)

            echo "$WF: ${STATUS:-not_found}"
            if [ "${STATUS}" != "success" ]; then
              ALL_PASSED=false
            fi
          done

          echo "all_passed=$ALL_PASSED" >> "$GITHUB_OUTPUT"
          echo "deploy_sha=$COMMIT_SHA" >> "$GITHUB_OUTPUT"

  # ── Deploy — only runs when gate passes ────────────────────────────────
  deploy:
    name: Deploy to Contabo
    needs: gate
    runs-on: ubuntu-latest
    if: ${{ needs.gate.outputs.all_passed == 'true' }}
    environment: production
    steps:
      - name: Configure SSH
        run: |
          test -n "${DEPLOY_HOST}" || { echo "DEPLOY_HOST is not configured"; exit 1; }
          mkdir -p ~/.ssh
          install -m 600 /dev/null ~/.ssh/id_ed25519
          echo "${{ secrets.DEPLOY_SSH_KEY }}" | base64 -d >> ~/.ssh/id_ed25519
          ssh-keyscan -H "${DEPLOY_HOST}" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy to Contabo
        env:
          DEPLOY_SHA: ${{ needs.gate.outputs.deploy_sha }}
        run: |
          test -n "${DEPLOY_USER}" || { echo "DEPLOY_USER is not configured"; exit 1; }
          test -n "${DEPLOY_PATH}" || { echo "DEPLOY_PATH is not configured"; exit 1; }
          ssh -o StrictHostKeyChecking=no -o ConnectTimeout=10 \
              -i ~/.ssh/id_ed25519 "${DEPLOY_USER}@${DEPLOY_HOST}" << 'DEPLOY_SCRIPT'
            set -e

            cd "${DEPLOY_PATH}"
            CORE_SERVICES="${CONTABO_SERVICES}"
            set -- -f docker-compose.contabo.yml

            compose_up() {
              if command -v docker-compose >/dev/null 2>&1; then
                docker-compose "$@"
              else
                docker compose "$@"
              fi
            }

            # Save previous commit for rollback
            git rev-parse HEAD > /tmp/quantmindx-prev-commit.txt

            # Pull the specific commit that passed CI
            git fetch origin "$DEPLOY_SHA"
            git checkout --force "$DEPLOY_SHA"

            # Reconcile the Docker-based production topology in place
            compose_up "$@" pull || true
            compose_up "$@" up -d --build $CORE_SERVICES

            echo "Deployed: $(git rev-parse --short $DEPLOY_SHA)"
          DEPLOY_SCRIPT

      - name: Health check
        run: |
          echo "Waiting for Contabo HMM service to restart..."
          if [ -z "${DEPLOY_HEALTHCHECK_URL}" ]; then
            DEPLOY_HEALTHCHECK_URL="http://${DEPLOY_HOST}:8001/api/hmm/health"
          fi
          for i in $(seq 1 30); do
            if curl -sf "${DEPLOY_HEALTHCHECK_URL}" > /dev/null 2>&1; then
              echo "Health check passed!"
              exit 0
            fi
            sleep 2
          done
          echo "Health check failed after 60s"
          exit 1

      - name: Rollback on failure
        if: failure()
        run: |
          echo "Deploy failed — rolling back..."
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/id_ed25519 "${DEPLOY_USER}@${DEPLOY_HOST}" << 'ROLLBACK_SCRIPT'
            set -e
            cd "${DEPLOY_PATH}"
            CORE_SERVICES="${CONTABO_SERVICES}"
            set -- -f docker-compose.contabo.yml
            compose_up() {
              if command -v docker-compose >/dev/null 2>&1; then
                docker-compose "$@"
              else
                docker compose "$@"
              fi
            }
            PREV_COMMIT=$(cat /tmp/quantmindx-prev-commit.txt)
            echo "Rolling back to: $PREV_COMMIT"
            git fetch origin "$PREV_COMMIT"
            git checkout --force "$PREV_COMMIT"
            compose_up "$@" up -d --build $CORE_SERVICES
            echo "Rollback complete"
          ROLLBACK_SCRIPT
