name: Deploy to Contabo

on:
  push:
    branches: [main]

permissions:
  contents: read
  actions: read
  statuses: read

jobs:
  # ── CI gate ────────────────────────────────────────────────────────────────
  ci-checks:
    name: CI Checks
    runs-on: ubuntu-latest
    outputs:
      all_passed: ${{ steps.ci-status.outputs.all_passed }}
    steps:
      - name: Check CI status
        id: ci-status
        run: |
          # Check all 5 CI workflows for this commit
          COMMIT_SHA=${{ github.sha }}
          WORKFLOWS=("SonarCloud SAST" "CodeQL Advanced" "Multi-Platform Build" "OWASP ZAP DAST" "Dependency Audit")
          ALL_PASSED=true

          for WF in "${WORKFLOWS[@]}"; do
            STATUS=$(curl -s -u "x-access-token:${{ secrets.GITHUB_TOKEN }}" \
              "https://api.github.com/repos/${{ github.repository }}/actions/runs?head_sha=$COMMIT_SHA&workflow_name=$WF&per_page=1" \
              | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['workflow_runs'][0]['conclusion'] if d['workflow_runs'] else 'not_run')" 2>/dev/null)
            echo "$WF: $STATUS"
            if [ "$STATUS" != "success" ]; then
              ALL_PASSED=false
            fi
          done

          echo "all_passed=$ALL_PASSED" >> $GITHUB_OUTPUT
          echo "All CI passed: $ALL_PASSED"

  # ── Deploy ────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to Contabo
    needs: ci-checks
    runs-on: ubuntu-latest
    if: ${{ needs.ci-checks.outputs.all_passed == 'true' }}
    environment: production
    steps:
      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.CONTABO_SSH_KEY }}" | base64 -d > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H 155.133.27.86 >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy to Contabo
        run: |
          ssh -o StrictHostKeyChecking=no -o ConnectTimeout=10 \
              -i ~/.ssh/id_ed25519 root@155.133.27.86 << 'DEPLOY_SCRIPT'
            set -e

            cd /opt/quantmindx

            # Save previous commit for rollback
            git rev-parse HEAD > /tmp/prev_commit.txt

            # Pull latest code
            git fetch origin main
            git reset --hard origin/main

            # Restart systemd API service
            systemctl restart quantmind-api

            echo "Deployed: $(git rev-parse --short HEAD)"
          DEPLOY_SCRIPT

      - name: Health check
        run: |
          echo "Waiting for API to restart..."
          for i in $(seq 1 30); do
            if curl -sf http://155.133.27.86:8000/health > /dev/null 2>&1; then
              echo "Health check passed!"
              exit 0
            fi
            sleep 2
          done
          echo "Health check failed after 60s"
          exit 1

      - name: Rollback on failure
        if: failure()
        run: |
          echo "Deploy failed — rolling back..."
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/id_ed25519 root@155.133.27.86 << 'ROLLBACK_SCRIPT'
            set -e
            cd /opt/quantmindx
            PREV_COMMIT=$(cat /tmp/prev_commit.txt)
            echo "Rolling back to: $PREV_COMMIT"
            git reset --hard "$PREV_COMMIT"
            systemctl restart quantmind-api
            echo "Rollback complete"
          ROLLBACK_SCRIPT
