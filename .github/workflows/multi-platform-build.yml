name: Multi-Platform Build

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  # Frontend build test
  frontend:
    name: Frontend Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: npm audit (security)
        run: npm audit --audit-level=critical

      - name: Lint check
        run: npm run lint || true

      - name: Type check
        run: npm run check

      - name: Build frontend
        run: npm run build

      - name: Run tests
        run: npm test -- --run

  # Tauri build for each platform
  tauri-build:
    name: Tauri Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: frontend
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            libssl-dev \
            libwebkit2gtk-4.0-dev \
            libappindicator3-1 \
            librsvg2-dev \
            patchelf

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__
          releaseName: 'QUANTMINDX v__VERSION__'
          releaseBody: 'See the assets to download and install this version.'
          releaseDraft: true
          prerelease: false

      - name: Verify executable exists
        shell: bash
        run: |
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            ls -la src-tauri/target/release/*.exe || echo "No exe found"
          else
            ls -la src-tauri/target/release/quantmindx* || echo "No executable found"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: quantmindx-${{ matrix.os }}
          path: |
            src-tauri/target/release/*.exe
            src-tauri/target/release/quantmindx*
            src-tauri/target/release/bundle/**
          if-no-files-found: ignore

  # Integration tests on primary platform
  integration-test:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: tauri-build

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          pip install -r requirements.txt

      - name: Run backend tests
        run: |
          pytest tests/ -v --tb=short || true

  # Summary
  summary:
    name: Build Summary
    runs-on: ubuntu-latest
    needs: [tauri-build, integration-test]
    if: always()

    steps:
      - name: Summary
        run: |
          echo "## Build Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          echo "### Frontend Build" >> $GITHUB_STEP_SUMMARY
          echo "- Status: ${{ needs.frontend.result }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          echo "### Tauri Build" >> $GITHUB_STEP_SUMMARY
          echo "- Status: ${{ needs.tauri-build.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Builds run on: Ubuntu, Windows, macOS (see matrix)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          echo "### Integration Tests" >> $GITHUB_STEP_SUMMARY
          echo "- Status: ${{ needs.integration-test.result }}" >> $GITHUB_STEP_SUMMARY