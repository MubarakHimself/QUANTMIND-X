name: SonarCloud SAST

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

env:
  SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

jobs:
  sonarcloud:
    name: SonarCloud Scan
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: quantmind-ide/package-lock.json

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Install frontend dependencies
        run: npm ci
        working-directory: quantmind-ide

      - name: Build frontend
        run: npm run build
        working-directory: quantmind-ide

      - name: Run backend tests (generate coverage)
        run: |
          pip install pytest pytest-cov
          pytest tests/ --cov=src --cov-report=xml --tb=short || true

      - name: Run frontend tests
        run: npm run test:run -- --coverage --reporter=json
        working-directory: quantmind-ide

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@v2
        with:
          projectBaseDir: .
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  sonarcloud-python:
    name: SonarCloud Python Scan
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Run Python tests with coverage
        run: |
          pytest tests/ --cov=src --cov-report=xml --tb=short --ignore=tests/api --ignore=tests/e2e || true

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@v2
        with:
          projectBaseDir: .
          args: >
            -Dsonar.python.coverage.reportPaths=coverage.xml
            -Dsonar.sources=src/
            -Dsonar.tests=tests/
            -Dsonar.exclusions=**/migrations/**,**/__pycache__/**,**/*.pyc,**/.venv/**,**/node_modules/**
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  sonarcloud-frontend:
    name: SonarCloud Frontend Scan
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: quantmind-ide/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: quantmind-ide

      - name: Build frontend
        run: npm run build
        working-directory: quantmind-ide

      - name: Run tests
        run: npm run test:run -- --coverage --reporter=json
        working-directory: quantmind-ide

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@v2
        with:
          projectBaseDir: quantmind-ide
          args: >
            -Dsonar.sources=src/
            -Dsonar.tests=src/**/*.test.ts
            -Dsonar.exclusions=**/node_modules/**,**/dist/**,**/.svelte-kit/**
            -Dsonar.typescript.lcov.reportPaths=coverage/coverage-final.json
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    needs: [sonarcloud-python, sonarcloud-frontend]
    steps:
      - name: Check results
        run: |
          echo "SonarCloud SAST Scan completed"
          echo "Review results at: https://sonarcloud.io/project/overview?id=quantmindx"
          echo ""
          echo "Quality Gate requires:"
          echo "  - 0 Critical vulnerabilities"
          echo "  - 0 High vulnerabilities"
          echo "  - Coverage > 80%"
