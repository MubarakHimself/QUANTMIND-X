name: OWASP ZAP DAST

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

env:
  ZAP_TARGET_URL: ${{ vars.ZAP_TARGET_URL || 'http://localhost:8000' }}

jobs:
  zap-baseline-scan:
    name: ZAP Baseline Scan
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Start backend server
        run: |
          uvicorn src.api.server:app --host 0.0.0.0 --port 8000 &
          sleep 10
          curl -sf http://localhost:8000/health || echo "Server health check failed (continuing)"

      - name: Run ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.14.0
        continue-on-error: true
        with:
          target: ${{ env.ZAP_TARGET_URL }}
          rules_file_name: '.zap/config.xml'
          cmd_options: '-j -T 60 -m 1'

      - name: Upload ZAP report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: zap-baseline-report
          path: |
            zap-baseline-report.html
            zap-baseline-report.json
          if-no-files-found: ignore
          retention-days: 30

  zap-api-scan:
    name: ZAP API Scan
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Start backend server
        run: |
          uvicorn src.api.server:app --host 0.0.0.0 --port 8000 &
          sleep 10
          curl -sf http://localhost:8000/health || echo "Server health check failed (continuing)"

      - name: Run ZAP Full Scan
        uses: zaproxy/action-full-scan@v0.12.0
        continue-on-error: true
        with:
          target: ${{ env.ZAP_TARGET_URL }}/api/
          cmd_options: '-j -T 120 -m 5'

      - name: Upload ZAP report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: zap-full-scan-report
          path: |
            zap-full-scan-report.html
            zap-full-scan-report.json
          if-no-files-found: ignore
          retention-days: 30

  zap-report:
    name: ZAP Report Summary
    runs-on: ubuntu-latest
    needs: [zap-baseline-scan, zap-api-scan]
    if: always()
    steps:
      - name: Summary
        run: |
          echo "## ZAP DAST Scan Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Review detailed reports in the artifacts." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Acceptance Criteria:** 0 Critical/High vulnerabilities" >> $GITHUB_STEP_SUMMARY
