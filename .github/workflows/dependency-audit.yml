name: Dependency Audit

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  npm-audit:
    name: npm Audit (Frontend)
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: quantmind-ide/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: quantmind-ide

      - name: Run npm audit
        id: audit
        run: |
          npm audit --audit-level=critical --json > npm-audit-report.json || true
          cat npm-audit-report.json

      - name: Check for critical vulnerabilities
        run: |
          CRITICAL=$(cat npm-audit-report.json | grep -c '"level": "critical"' || echo "0")
          if [ "$CRITICAL" -gt 0 ]; then
            echo "Found $CRITICAL critical vulnerabilities"
            exit 1
          fi
          echo "No critical vulnerabilities found"

      - name: Upload npm audit report
        uses: actions/upload-artifact@v4
        with:
          name: npm-audit-report
          path: |
            npm-audit-report.json
          retention-days: 30

      - name: Create GitHub Issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: 'Security Alert: npm Critical Vulnerabilities',
              body: 'npm audit found critical vulnerabilities. Please review and remediate.',
              labels: ['security', 'vulnerability', 'dependencies']
            })

  pip-audit:
    name: pip-audit (Backend)
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pip-audit
        id: audit
        run: |
          pip-audit --format=json --output=pip-audit-report.json || true
          cat pip-audit-report.json

      - name: Check for critical vulnerabilities
        run: |
          # pip-audit returns non-zero if vulnerabilities found
          # Check if report has any critical vulnerabilities
          if [ -f pip-audit-report.json ]; then
            CRITICAL=$(cat pip-audit-report.json | grep -c '"fix_versions": \[\]' || cat pip-audit-report.json | grep -c 'critical' || echo "0")
            echo "pip-audit completed, review report for details"
          fi

      - name: Upload pip-audit report
        uses: actions/upload-artifact@v4
        with:
          name: pip-audit-report
          path: |
            pip-audit-report.json
          retention-days: 30

      - name: Create GitHub Issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: 'Security Alert: pip Critical Vulnerabilities',
              body: 'pip-audit found critical vulnerabilities. Please review and remediate.',
              labels: ['security', 'vulnerability', 'dependencies']
            })

  safety-audit:
    name: Safety Check (Python)
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Safety
        run: pip install safety

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Safety check
        run: |
          safety check --json --output=safety-report.json || true
          cat safety-report.json || echo "No vulnerabilities found"

      - name: Upload Safety report
        uses: actions/upload-artifact@v4
        with:
          name: safety-report
          path: |
            safety-report.json
          retention-days: 30

  dependency-summary:
    name: Dependency Audit Summary
    runs-on: ubuntu-latest
    needs: [npm-audit, pip-audit, safety-audit]
    if: always()
    steps:
      - name: Download audit reports
        uses: actions/download-artifact@v4
        with:
          path: reports

      - name: Summary
        run: |
          echo "## Dependency Audit Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Frontend (npm audit)" >> $GITHUB_STEP_SUMMARY
          echo "- Status: ${{ needs.npm-audit.result }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Backend (pip-audit)" >> $GITHUB_STEP_SUMMARY
          echo "- Status: ${{ needs.pip-audit.result }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Backend (Safety)" >> $GITHUB_STEP_SUMMARY
          echo "- Status: ${{ needs.safety-audit.result }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Acceptance Criteria:** 0 Critical vulnerabilities" >> $GITHUB_STEP_SUMMARY
