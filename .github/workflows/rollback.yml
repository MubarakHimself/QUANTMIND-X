name: Rollback Contabo

on:
  workflow_dispatch:
    inputs:
      git_ref:
        description: "Git ref to rollback to (commit SHA, branch, or tag)"
        required: true
        type: string

permissions:
  contents: read

env:
  GIT_REF: ${{ inputs.git_ref }}
  DEPLOY_HOST: ${{ vars.DEPLOY_HOST }}
  DEPLOY_USER: ${{ vars.DEPLOY_USER }}
  DEPLOY_PATH: ${{ vars.DEPLOY_PATH }}
  DEPLOY_HEALTHCHECK_URL: ${{ vars.DEPLOY_HEALTHCHECK_URL }}

jobs:
  rollback:
    name: Rollback to ${{ inputs.git_ref }}
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure SSH
        run: |
          test -n "${DEPLOY_HOST}" || { echo "DEPLOY_HOST is not configured"; exit 1; }
          mkdir -p ~/.ssh
          install -m 600 /dev/null ~/.ssh/id_ed25519
          echo "${{ secrets.DEPLOY_SSH_KEY }}" | base64 -d >> ~/.ssh/id_ed25519
          ssh-keyscan -H "${DEPLOY_HOST}" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Rollback on Contabo
        env:
          GIT_REF: ${{ inputs.git_ref }}
        run: |
          test -n "${DEPLOY_USER}" || { echo "DEPLOY_USER is not configured"; exit 1; }
          test -n "${DEPLOY_PATH}" || { echo "DEPLOY_PATH is not configured"; exit 1; }
          ssh -o StrictHostKeyChecking=no -o ConnectTimeout=10 \
              -i ~/.ssh/id_ed25519 "${DEPLOY_USER}@${DEPLOY_HOST}" << 'ROLLBACK_SCRIPT'
            set -e
            cd "${DEPLOY_PATH}"
            COMPOSE="docker compose -f docker-compose.production.yml -f docker-compose.contabo.yml -f docker-compose.contabo.override.yml"
            CORE_SERVICES="redis quantmind-api prefect-server prefect-worker hmm-inference-api hmm-scheduler"
            git fetch --all --tags
            git checkout --force "$GIT_REF"
            $COMPOSE up -d --build $CORE_SERVICES
            echo "Rolled back to: $GIT_REF"
          ROLLBACK_SCRIPT

      - name: Health check
        run: |
          echo "Waiting for API to start..."
          if [ -z "${DEPLOY_HEALTHCHECK_URL}" ]; then
            DEPLOY_HEALTHCHECK_URL="http://${DEPLOY_HOST}:8000/health"
          fi
          for i in $(seq 1 30); do
            if curl -sf "${DEPLOY_HEALTHCHECK_URL}" > /dev/null 2>&1; then
              echo "Health check passed!"
              exit 0
            fi
            sleep 2
          done
          echo "Health check failed after 60s"
          exit 1

      - name: Confirm rollback
        if: success()
        run: |
          ssh -i ~/.ssh/id_ed25519 "${DEPLOY_USER}@${DEPLOY_HOST}" \
            "cd ${DEPLOY_PATH} && git log --oneline -3"
          echo "Rollback complete: $GITHUB_RUN_ID"
