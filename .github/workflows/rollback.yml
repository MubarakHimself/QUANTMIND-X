name: Rollback Contabo

on:
  workflow_dispatch:
    inputs:
      git_ref:
        description: "Git ref to rollback to (commit SHA, branch, or tag)"
        required: true
        type: string

permissions:
  contents: read

env:
  GIT_REF: ${{ inputs.git_ref }}

jobs:
  rollback:
    name: Rollback to ${{ inputs.git_ref }}
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          install -m 600 /dev/null ~/.ssh/id_ed25519
          echo "${{ secrets.CONTABO_SSH_KEY }}" | base64 -d >> ~/.ssh/id_ed25519
          ssh-keyscan -H 155.133.27.86 >> ~/.ssh/known_hosts 2>/dev/null

      - name: Rollback on Contabo
        env:
          GIT_REF: ${{ inputs.git_ref }}
        run: |
          SCRIPT="cd /opt/quantmindx && git fetch --all --tags && git reset --hard $GIT_REF && systemctl restart quantmind-api && echo 'Rolled back to: $GIT_REF'"
          ssh -o StrictHostKeyChecking=no -o ConnectTimeout=10 \
              -i ~/.ssh/id_ed25519 root@155.133.27.86 "$SCRIPT"

      - name: Health check
        run: |
          echo "Waiting for API to start..."
          for i in $(seq 1 30); do
            if curl -sf http://155.133.27.86:8000/health > /dev/null 2>&1; then
              echo "Health check passed!"
              exit 0
            fi
            sleep 2
          done
          echo "Health check failed after 60s"
          exit 1

      - name: Confirm rollback
        if: success()
        run: |
          ssh -i ~/.ssh/id_ed25519 root@155.133.27.86 \
            'cd /opt/quantmindx && git log --oneline -3'
          echo "Rollback complete: $GITHUB_RUN_ID"
