version: '3.8'

services:
  # PageIndex for Articles (MQL5 scraped articles)
  pageindex-articles:
    build:
      context: .
      dockerfile: docker/pageindex/Dockerfile.articles
    container_name: quantmindx-pageindex-articles
    volumes:
      - ./data/scraped_articles:/data/articles:ro
    ports:
      - "3000:3000"
    restart: unless-stopped
    networks:
      - quantmind-network

  # PageIndex for Books/PDFs
  pageindex-books:
    build:
      context: .
      dockerfile: docker/pageindex/Dockerfile.books
    container_name: quantmindx-pageindex-books
    volumes:
      - ./data/knowledge_base/books:/data/books:ro
    ports:
      - "3001:3001"
    restart: unless-stopped
    networks:
      - quantmind-network

  # PageIndex for Trading Logs
  pageindex-logs:
    build:
      context: .
      dockerfile: docker/pageindex/Dockerfile.logs
    container_name: quantmindx-pageindex-logs
    volumes:
      - ./data/logs:/data/logs:ro
    ports:
      - "3002:3002"
    restart: unless-stopped
    networks:
      - quantmind-network

  # Knowledge Base Indexer (PageIndex-based)
  kb-indexer:
    build:
      context: .
      dockerfile: scripts/index_kb.dockerfile
    container_name: quantmindx-indexer
    volumes:
      - ./data:/app/data
      - ./scripts:/app/scripts
    environment:
      - PAGEINDEX_ARTICLES_URL=http://pageindex-articles:3000
      - PAGEINDEX_BOOKS_URL=http://pageindex-books:3001
      - PAGEINDEX_LOGS_URL=http://pageindex-logs:3002
    depends_on:
      - pageindex-articles
      - pageindex-books
      - pageindex-logs
    restart: "no"
    networks:
      - quantmind-network

networks:
  quantmind-network:
    driver: bridge