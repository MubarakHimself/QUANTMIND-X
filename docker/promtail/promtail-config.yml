server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: ${GRAFANA_LOKI_URL}/loki/api/v1/push
    basic_auth:
      username: ${GRAFANA_INSTANCE_ID}
      password: ${GRAFANA_API_KEY}
    tenant_id: ${GRAFANA_INSTANCE_ID}

scrape_configs:
  # QuantMindX API logs
  - job_name: api
    static_configs:
      - targets:
          - localhost
        labels:
          job: quantmind-api
          host: ${HOSTNAME}
          __path__: /app/logs/quantmind.log
    pipeline_stages:
      - json:
          expressions:
            level: level
            logger: logger
            message: message
            module: module
            function: function
            line: line
            timestamp: timestamp
            mode: mode
            ea_id: ea_id
            symbol: symbol
            trade_id: trade_id
            pnl: pnl
      - labels:
          level:
          logger:
          module:
          mode:
          symbol:
      - timestamp:
          source: timestamp
          format: RFC3339

  # Strategy Router logs
  - job_name: router
    static_configs:
      - targets:
          - localhost
        labels:
          job: quantmind-router
          host: ${HOSTNAME}
          __path__: /app/logs/router.log
    pipeline_stages:
      - json:
          expressions:
            level: level
            logger: logger
            message: message
            module: module
            timestamp: timestamp
            regime: regime
            chaos_score: chaos_score
            regime_quality: regime_quality
      - labels:
          level:
          logger:
          module:
          regime:
      - timestamp:
          source: timestamp
          format: RFC3339

  # MT5 Bridge logs
  - job_name: mt5-bridge
    static_configs:
      - targets:
          - localhost
        labels:
          job: quantmind-mt5-bridge
          host: ${HOSTNAME}
          __path__: /app/logs/mt5-bridge.log
    pipeline_stages:
      - json:
          expressions:
            level: level
            logger: logger
            message: message
            timestamp: timestamp
      - labels:
          level:
          logger:
      - timestamp:
          source: timestamp
          format: RFC3339

  # Enhanced Kelly Position Sizing logs
  - job_name: enhanced-kelly
    static_configs:
      - targets:
          - localhost
        labels:
          job: quantmind-kelly
          host: ${HOSTNAME}
          __path__: /app/logs/enhanced_kelly.log
    pipeline_stages:
      - json:
          expressions:
            level: level
            logger: logger
            message: message
            timestamp: timestamp
            kelly_fraction: kelly_fraction
            position_size: position_size
            risk_amount: risk_amount
      - labels:
          level:
          logger:
      - timestamp:
          source: timestamp
          format: RFC3339

  # Docker container logs (catch-all)
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
        filters:
          - name: label
            values: ["com.docker.compose.project=quantmindx"]
    relabel_configs:
      - source_labels: ['__meta_docker_container_name']
        regex: '/(.*)'
        target_label: container
      - source_labels: ['__meta_docker_container_log_stream']
        target_label: stream
      - source_labels: ['__meta_docker_container_label_com_docker_compose_service']
        target_label: service

  # All logs wildcard (fallback)
  - job_name: all-logs
    static_configs:
      - targets:
          - localhost
        labels:
          job: quantmind-all
          host: ${HOSTNAME}
          __path__: /app/logs/*.log

  # Deployment logs for CI/CD tracking
  - job_name: deployments
    static_configs:
      - targets:
          - localhost
        labels:
          job: quantmind-deployments
          host: ${HOSTNAME}
          __path__: /app/logs/deployments.log
    pipeline_stages:
      - json:
          expressions:
            timestamp: timestamp
            version_from: version_from
            version_to: version_to
            vps: vps
            status: status
            duration_seconds: duration_seconds
      - labels:
          status:
          vps:
      - timestamp:
          source: timestamp
          format: RFC3339
