# Tick Streaming Configuration
# QuantMindX ZMQ-based Real-Time Tick Streaming Settings

# ZMQ Settings
zmq_enabled: true
zmq_port: 5555
zmq_timeout_ms: 1000
zmq_heartbeat_interval_sec: 5

# Fallback Settings (when ZMQ is unavailable)
polling_interval_ms: 100
enable_fallback: true

# Tick Validation Settings
max_tick_age_ms: 100
validate_sequence: true

# Symbol Limits
max_symbols: 50
priority_symbols:
  - EURUSD
  - GBPUSD
  - XAUUSD
  - USDJPY
  - AUDUSD
  - USDCAD

# Performance Settings
tick_buffer_size: 1000
broadcast_workers: 4

# Logging
log_level: INFO
log_tick_latency: true
