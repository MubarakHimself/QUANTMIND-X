networks:
  quantmind-network:
    driver: bridge
    name: quantmind-network
services:
  hmm-inference-api:
    command: sh -c "pip install --no-cache-dir fastapi uvicorn && python -m uvicorn
      src.api.hmm_inference_server:app --host 0.0.0.0 --port 8001"
    container_name: quantmind-hmm-inference-api
    environment:
    - QUANTMIND_ENV=production
    - PYTHONPATH=/app
    - CONTABO_HMM_API_KEY=${CONTABO_HMM_API_KEY}
    - CONTABO_HOST=${CONTABO_HOST}
    - CONTABO_USER=${CONTABO_USER}
    - CONTABO_SSH_KEY_PATH=${CONTABO_SSH_KEY_PATH}
    - WARM_DB_PATH=/data/market_data.duckdb
    - CONTABO_MODEL_PATH=/data/hmm/models
    - CONTABO_METADATA_PATH=/data/hmm/metadata
    healthcheck:
      interval: 30s
      retries: 3
      test:
      - CMD
      - curl
      - -f
      - http://localhost:8001/health
      timeout: 10s
    image: python:3.11-slim
    labels:
    - com.docker.compose.project=quantmindx
    - service=hmm-inference-api
    networks:
    - quantmind-network
    ports:
    - 8001:8001
    restart: unless-stopped
    volumes:
    - ./src:/app/src:ro
    - ./data/hmm:/data/hmm
    - ./config:/app/config:ro
    - ./logs:/app/logs
    working_dir: /app
  hmm-scheduler:
    command: python scripts/schedule_hmm_training.py --start
    container_name: quantmind-hmm-scheduler
    depends_on:
    - hmm-inference-api
    deploy:
      resources:
        limits:
          memory: 512M
    environment:
    - QUANTMIND_ENV=production
    - PYTHONPATH=/app
    - PROMETHEUS_PORT=9093
    - CONTABO_HOST=${CONTABO_HOST}
    - CONTABO_USER=${CONTABO_USER}
    - CONTABO_SSH_KEY_PATH=${CONTABO_SSH_KEY_PATH}
    healthcheck:
      interval: 30s
      retries: 3
      test:
      - CMD
      - curl
      - -f
      - http://localhost:9093/metrics
      timeout: 10s
    image: python:3.11-slim
    labels:
    - com.docker.compose.project=quantmindx
    - service=hmm-scheduler
    networks:
    - quantmind-network
    ports:
    - 9093:9093
    restart: unless-stopped
    volumes:
    - ./data/hmm:/data/hmm
    - ./config:/app/config:ro
    - ./scripts:/app/scripts:ro
    working_dir: /app
  prometheus-agent-contabo:
    command:
    - --config.file=/etc/prometheus/agent-prometheus-contabo.yml
    container_name: quantmind-prometheus-agent-contabo
    depends_on:
    - hmm-inference-api
    - hmm-scheduler
    deploy:
      resources:
        limits:
          memory: 256M
    environment:
    - GRAFANA_PROMETHEUS_URL=${GRAFANA_PROMETHEUS_URL}
    - GRAFANA_INSTANCE_ID=${GRAFANA_INSTANCE_ID}
    - GRAFANA_API_KEY=${GRAFANA_API_KEY}
    healthcheck:
      interval: 30s
      retries: 3
      test:
      - CMD
      - wget
      - -q
      - --spider
      - http://localhost:9090/-/healthy
      timeout: 10s
    image: prom/prometheus:latest
    labels:
    - com.docker.compose.project=quantmindx
    - service=prometheus-agent-contabo
    networks:
    - quantmind-network
    ports:
    - 9099:9090
    restart: unless-stopped
    volumes:
    - ./docker/prometheus/agent-prometheus-contabo.yml:/etc/prometheus/agent-prometheus-contabo.yml:ro
    - prometheus-wal:/prometheus/wal
  promtail:
    command:
    - -config.file=/etc/promtail/config.yml
    - -config.expand-env=true
    container_name: quantmind-promtail
    deploy:
      resources:
        limits:
          memory: 100M
    environment:
    - GRAFANA_LOKI_URL=${GRAFANA_LOKI_URL}
    - GRAFANA_INSTANCE_ID=${GRAFANA_INSTANCE_ID}
    - GRAFANA_API_KEY=${GRAFANA_API_KEY}
    - HOSTNAME=contabo-vps
    healthcheck:
      interval: 30s
      retries: 3
      test:
      - CMD
      - wget
      - -q
      - --spider
      - http://localhost:9080/ready
      timeout: 10s
    image: grafana/promtail:latest
    labels:
    - com.docker.compose.project=quantmindx
    - service=promtail
    networks:
    - quantmind-network
    restart: unless-stopped
    volumes:
    - ./docker/promtail/promtail-config.yml:/etc/promtail/config.yml:ro
    - ./logs:/app/logs:ro
    - /var/run/docker.sock:/var/run/docker.sock:ro

  prefect-server:
    command: prefect server start --host 0.0.0.0
    container_name: quantmind-prefect-server
    environment:
      - QUANTMIND_ENV=production
      - PREFECT_HOME=/root/.prefect
      - PREFECT_API_DATABASE_CONNECTION_URL=sqlite+aiosqlite:///./prefect.db
    healthcheck:
      interval: 30s
      retries: 3
      test:
        - CMD
        - curl
        - -f
        - http://localhost:4200/api/health
      timeout: 10s
    image: prefecthq/prefect:2-latest
    labels:
      - com.docker.compose.project=quantmindx
      - service=prefect-server
    networks:
      - quantmind-network
    ports:
      - "4200:4200"
    restart: unless-stopped
    volumes:
      - ./data/prefect:/root/.prefect
      - ./flows:/flows:ro
    working_dir: /root/.prefect

  prefect-worker:
    command: prefect worker start --pool contabo
    container_name: quantmind-prefect-worker
    depends_on:
      - prefect-server
    environment:
      - QUANTMIND_ENV=production
      - PREFECT_API_URL=http://prefect-server:4200/api
      - PREFECT_HOME=/root/.prefect
    healthcheck:
      interval: 30s
      retries: 3
      test:
        - CMD-SHELL
        - ps -ef | grep '[p]refect worker start --pool contabo' >/dev/null
      timeout: 10s
    image: prefecthq/prefect:2-latest
    labels:
      - com.docker.compose.project=quantmindx
      - service=prefect-worker
    networks:
      - quantmind-network
    restart: unless-stopped
    volumes:
      - ./data/prefect:/root/.prefect
      - ./flows:/flows:ro
    working_dir: /root/.prefect

version: '3.8'
volumes:
  prometheus-wal:
    driver: local
