version: "3.8"

# QuantMindX Production Docker Compose
# Includes: API Server, MT5 Bridge, Prometheus Agent, Promtail, and OpenTelemetry Collector
# Usage: docker-compose -f docker-compose.production.yml up -d

services:
  redis:
    image: redis:7-alpine
    container_name: quantmind-redis
    command: ["redis-server", "--appendonly", "yes"]
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - quantmind-network
    labels:
      - "com.docker.compose.project=quantmindx"
      - "service=redis"

  # ========== PageIndex Services for Knowledge Base ==========
  pageindex-articles:
    build:
      context: .
      dockerfile: docker/pageindex/Dockerfile.articles
    container_name: quantmindx-pageindex-articles
    volumes:
      - ./data/scraped_articles:/data/articles:ro
    ports:
      - "3000:3000"
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
    networks:
      - quantmind-network
    labels:
      - "com.docker.compose.project=quantmindx"
      - "service=pageindex-articles"

  pageindex-books:
    build:
      context: .
      dockerfile: docker/pageindex/Dockerfile.books
    container_name: quantmindx-pageindex-books
    volumes:
      - ./data/knowledge_base/books:/data/books:ro
    ports:
      - "3001:3001"
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
    networks:
      - quantmind-network
    labels:
      - "com.docker.compose.project=quantmindx"
      - "service=pageindex-books"

  pageindex-logs:
    build:
      context: .
      dockerfile: docker/pageindex/Dockerfile.logs
    container_name: quantmindx-pageindex-logs
    volumes:
      - ./data/logs:/data/logs:ro
    ports:
      - "3002:3002"
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
    networks:
      - quantmind-network
    labels:
      - "com.docker.compose.project=quantmindx"
      - "service=pageindex-logs"

  # ========== QuantMindX API Server ==========
  quantmind-api:
    image: quantmind-api:latest
    build:
      context: .
      dockerfile: server/Dockerfile
    container_name: quantmind-api
    restart: unless-stopped
    ports:
      - "8000:8000"    # API port
      - "9090:9090"    # Prometheus metrics port
      # Dev-only: add "- 37777:37777" for claude-mem web viewer
      # Enable with: docker-compose --profile dev up
    volumes:
      - ./logs:/app/logs
      - ./config:/app/config:ro
      - ./workspaces:/app/workspaces
      - ./data:/app/data           # persistent DB files (graph_memory.db, provider configs)
      - quantmind-state-data:/app/state
      - claude-mem-data:/home/trader/.claude-mem
      # Mount CLI auth tokens for Gemini and Qwen
      - ~/.gemini:/home/trader/.gemini:ro
      - ~/.qwen:/home/trader/.qwen:ro
    environment:
      - QUANTMIND_ENV=production
      - QUANTMIND_VERSION=1.0.0
      - PROMETHEUS_PORT=9090
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-tauri://localhost,tauri://127.0.0.1,http://localhost:1420,http://localhost:5173,http://localhost:3000,http://127.0.0.1:1420,http://127.0.0.1:5173,http://127.0.0.1:3000,https://app.quantmindx.com,https://www.quantmindx.com,https://quantmindx.com}
      - GRAFANA_PROMETHEUS_URL=${GRAFANA_PROMETHEUS_URL}
      - GRAFANA_LOKI_URL=${GRAFANA_LOKI_URL}
      - GRAFANA_INSTANCE_ID=${GRAFANA_INSTANCE_ID}
      - GRAFANA_API_KEY=${GRAFANA_API_KEY}
      - GRAFANA_TEMPO_OTLP_ENDPOINT=${GRAFANA_TEMPO_OTLP_ENDPOINT:-http://otel-collector:4317}
      - GRAFANA_TEMPO_USER=${GRAFANA_TEMPO_USER:}
      - GRAFANA_TEMPO_API_KEY=${GRAFANA_TEMPO_API_KEY:}
      - OTEL_EXPORTER_OTLP_ENDPOINT=${OTEL_EXPORTER_OTLP_ENDPOINT:-http://otel-collector:4317}
      - OTEL_SERVICE_NAME=quantmind-api
      - NODE_ENVIRONMENT=production
      - FIRECRAWL_API_KEY=${FIRECRAWL_API_KEY}
      - PAGEINDEX_ARTICLES_URL=http://pageindex-articles:3000
      - PAGEINDEX_BOOKS_URL=http://pageindex-books:3001
      - PAGEINDEX_LOGS_URL=http://pageindex-logs:3002
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - REDIS_HOST=${REDIS_HOST:-redis}
      - REDIS_PORT=${REDIS_PORT:-6379}
      - INTERNAL_API_BASE_URL=${INTERNAL_API_BASE_URL:-http://quantmind-api:8000}
      - QUANTMIND_MACHINE_KEY_FILE=${QUANTMIND_MACHINE_KEY_FILE:-/app/state/machine.key}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      # Zero-Auth: Claude OAuth (Claude Max subscription — no API key required)
      - CLAUDE_SESSION_TOKEN=${CLAUDE_SESSION_TOKEN:-}
      - CLAUDE_ACCOUNT_TYPE=${CLAUDE_ACCOUNT_TYPE:-max}
      # Zero-Auth: Gemini ADC (Google Application Default Credentials — no API key required)
      - GOOGLE_CLOUD_PROJECT=${GOOGLE_CLOUD_PROJECT:-}
      - GOOGLE_APPLICATION_CREDENTIALS=${GOOGLE_APPLICATION_CREDENTIALS:-}
      - CLAUDE_MEM_PORT=37777
      # Node role — controls which router groups are registered at startup
      # contabo = agent/compute/memory/settings routers (backend node)
      # cloudzy = trading/risk routers (trading node)
      # local = all routers (development)
      - NODE_ROLE=${NODE_ROLE:-contabo}
      # Graph memory database path (persistent volume mount)
      - GRAPH_MEMORY_DB=/app/data/graph_memory.db
      # LLM Provider API keys (configure via Settings → Providers in the UI)
      - MINIMAX_API_KEY=${MINIMAX_API_KEY:-}
      - GLM_API_KEY=${GLM_API_KEY:-}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
    deploy:
      resources:
        limits:
          memory: 2g
          cpus: "2.0"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - quantmind-network
    depends_on:
      - redis
      - pageindex-articles
      - pageindex-books
      - pageindex-logs
    labels:
      - "com.docker.compose.project=quantmindx"
      - "service=api"

  # ========== MT5 Bridge Server ==========
  mt5-bridge:
    build:
      context: ./mt5-bridge
      dockerfile: Dockerfile
    container_name: quantmind-mt5-bridge
    restart: unless-stopped
    ports:
      - "5005:5005"    # API port
      - "9091:9091"    # Prometheus metrics port
    volumes:
      - ./logs:/app/logs
    environment:
      - MT5_BRIDGE_TOKEN=${MT5_BRIDGE_TOKEN:-secret-token-change-me}
      - MT5_PROMETHEUS_PORT=9091
      - GRAFANA_PROMETHEUS_URL=${GRAFANA_PROMETHEUS_URL}
      - GRAFANA_INSTANCE_ID=${GRAFANA_INSTANCE_ID}
      - GRAFANA_API_KEY=${GRAFANA_API_KEY}
    # MT5 requires Windows - this service should run on Windows host
    # For VPS, use host network mode or configure appropriately
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5005/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - quantmind-network
    labels:
      - "com.docker.compose.project=quantmindx"
      - "service=mt5-bridge"

  # ========== Prometheus Agent for Grafana Cloud ==========
  # Scrapes local metrics and remote_writes to Grafana Cloud
  prometheus-agent:
    image: prom/prometheus:latest
    container_name: quantmind-prometheus-agent
    restart: unless-stopped
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.agent.path=/prometheus/wal'
      - '--enable-feature=agent'  # Run in agent mode (remote_write only)
    ports:
      - "9099:9090"    # Prometheus agent UI (optional, for debugging)
    volumes:
      - ./docker/prometheus/agent-prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-wal:/prometheus/wal
    environment:
      - GRAFANA_PROMETHEUS_URL=${GRAFANA_PROMETHEUS_URL}
      - GRAFANA_INSTANCE_ID=${GRAFANA_INSTANCE_ID}
      - GRAFANA_API_KEY=${GRAFANA_API_KEY}
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - quantmind-network
    labels:
      - "com.docker.compose.project=quantmindx"
      - "service=prometheus-agent"
    depends_on:
      - quantmind-api
      - mt5-bridge

  # ========== Promtail Log Shipper ==========
  promtail:
    image: grafana/promtail:latest
    container_name: quantmind-promtail
    restart: unless-stopped
    command:
      - -config.file=/etc/promtail/config.yml
      - -config.expand-env=true
    volumes:
      - ./docker/promtail/promtail-config.yml:/etc/promtail/config.yml:ro
      - ./logs:/app/logs:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      - GRAFANA_LOKI_URL=${GRAFANA_LOKI_URL}
      - GRAFANA_INSTANCE_ID=${GRAFANA_INSTANCE_ID}
      - GRAFANA_API_KEY=${GRAFANA_API_KEY}
      - HOSTNAME=quantmindx-vps
    deploy:
      resources:
        limits:
          memory: 100M
          cpus: "0.25"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9080/ready"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - quantmind-network
    labels:
      - "com.docker.compose.project=quantmindx"
      - "service=promtail"
    depends_on:
      - quantmind-api

  # ========== OpenTelemetry Collector ==========
  # Receives OTLP traces from services and exports to Grafana Tempo
  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    container_name: quantmind-otel-collector
    restart: unless-stopped
    command:
      - --config=/etc/otelcol-contrib/config.yaml
    ports:
      - "4317:4317"    # OTLP gRPC receiver
      - "4318:4318"    # OTLP HTTP receiver
      - "8888:8888"    # Prometheus metrics (collector health)
      - "8889:8889"    # Prometheus exporter endpoint
      - "13133:13133"  # Health check extension
    volumes:
      - ./docker/otel/collector-config.yml:/etc/otelcol-contrib/config.yaml:ro
    environment:
      - GRAFANA_TEMPO_ENDPOINT=${GRAFANA_TEMPO_ENDPOINT}
      - GRAFANA_TEMPO_USER=${GRAFANA_TEMPO_USER:}
      - GRAFANA_TEMPO_API_KEY=${GRAFANA_TEMPO_API_KEY:}
      - NODE_ENVIRONMENT=production
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:13133/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - quantmind-network
    labels:
      - "com.docker.compose.project=quantmindx"
      - "service=otel-collector"
    depends_on:
      - quantmind-api

# ========== Networks ==========
networks:
  quantmind-network:
    driver: bridge
    name: quantmind-network

# ========== Volumes ==========
volumes:
  logs:
    driver: local
  prometheus-wal:
    driver: local
  claude-mem-data:
    driver: local
  redis-data:
    driver: local
  quantmind-state-data:
    driver: local
