sonar.projectKey=MubarakHimself_QUANTMIND-X
sonar.organization=mubarakhimself

# Sources
sonar.sources=src/,quantmind-ide/src/
sonar.tests=tests/,quantmind-ide/src/
sonar.test.inclusions=tests/**,quantmind-ide/src/**/*.test.ts,quantmind-ide/src/**/*.spec.ts

# Exclusions — wildcards not allowed in sonar.sources/sonar.tests, use exclusions instead
sonar.exclusions=\
  **/migrations/**,\
  **/__pycache__/**,\
  **/*.pyc,\
  **/.venv/**,\
  **/node_modules/**,\
  **/dist/**,\
  **/build/**,\
  **/.svelte-kit/**,\
  **/coverage/**,\
  quantmind-ide/src/agents/**,\
  src/agents/tools/mql5_tools.py

# Python
sonar.python.version=3.11
sonar.python.coverage.reportPaths=coverage.xml

# Coverage exclusions
sonar.coverage.exclusions=\
  **/migrations/**,\
  **/__pycache__/**,\
  **/*.pyc,\
  **/.venv/**,\
  **/node_modules/**

# Quality Gate — set to false so CI doesn't fail on code quality issues (fix incrementally)
sonar.qualitygate.wait=false

# Duplication
sonar.cpd.exclusions=**/__pycache__/**,**/*.pyc,**/.venv/**,**/node_modules/**
