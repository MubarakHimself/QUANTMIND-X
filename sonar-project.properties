sonar.projectKey=quantmindx
sonar.organization=quantmindx

# Python
sonar.python.version=3.11
sonar.sources=src/
sonar.tests=tests/
sonar.exclusions=**/migrations/**,**/__pycache__/**,**/*.pyc,**/.venv/**,**/node_modules/**,**/dist/**,**/build/**
sonar.test.exclusions=**/__pycache__/**,**/*.pyc,**/.venv/**

# Coverage
sonar.python.coverage.reportPaths=coverage.xml
sonar.coverage.exclusions=**/migrations/**,**/__pycache__/**,**/*.pyc,**/.venv/**,**/node_modules/**

# JavaScript/TypeScript
sonarjs.typescript.version=5.5
sonar.sources=quantmind-ide/src/
sonar.tests=quantmind-ide/src/**/*.test.ts
sonar.exclusions=**/node_modules/**,**/dist/**,**/.svelte-kit/**,**/coverage/**

# Security
sonar.security.languages=python,javascript,typescript
sonar.security.javascript.sources=quantmind-ide/src/
sonar.security.python.sources=src/

# Quality Gates
sonar.qualitygate.wait=true
sonar.qualitygate.timeout=300

# Bug detection
sonar.issue.ignore.all_java_file_parameters=true

# Duplication
sonar.cpd.exclusions=**/__pycache__/**,**/*.pyc,**/.venv/**,**/node_modules/**
