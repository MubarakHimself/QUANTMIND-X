[pytest]
pythonpath = .
testpaths = tests src scripts
markers =
    router: tests for src/router and extensions
    slow: marks tests as slow (load tests, extended operations)
    benchmark: marks tests as benchmark tests (performance validation)
    integration: integration tests requiring external services or broader system wiring
    e2e: end-to-end tests exercising full workflows
    mt5: tests requiring MetaTrader 5 or MT5-adjacent environment
    asyncio: async tests executed with pytest-asyncio
addopts = -ra
norecursedirs = .git .pytest_cache node_modules dist build venv .venv
